<div class="col-lg-4 col-md-6 mb-30px card-group">
  <div class="card h-100">
    <div class="maxthumb">
      <a href="{{ site.baseurl }}{{ post.url }}">
        {% if post.image %}
        <img class="img-fluid" loading="lazy" src="{% if post.image contains "://" %}{{ post.image }}{% else %}{{ site.baseurl }}/{{ post.image }}{% endif %}" alt="{{ post.title }}">
        {% endif %}
      </a>
    </div>
    <div class="card-body">
      <h2 class="card-title">
        <a class="text-dark" href="{{ site.baseurl }}{{ post.url }}"
          >{{ post.title }}</a
        >
      </h2>
      <h4 class="card-text">
        {{ post.excerpt | strip_html | truncatewords:30 }}
      </h4>
    </div>
  </div>
</div>
