<form class="d-flex my-2 my-lg-0" id="searchForm" role="search">
  <input
    type="search"
    class="form-control"
    id="lunrsearch"
    name="q"
    maxlength="255"
    value=""
    placeholder="Search..."
    aria-label="Search blog posts"
  />
</form>

<noscript><small class="text-muted">Search requires JavaScript.</small></noscript>
<div id="lunrsearchresults">
  <ul></ul>
</div>

<script>
(function () {
  var searchReady = false;
  var pendingSearch = null;

  function loadScript(src, callback) {
    var s = document.createElement('script');
    s.src = src;
    s.onload = callback;
    document.body.appendChild(s);
  }

  function loadSearchScripts() {
    if (searchReady || window._searchLoading) return;
    window._searchLoading = true;
    loadScript('https://cdn.jsdelivr.net/npm/lunr@2.1.5/lunr.min.js', function () {
      loadScript('{{ site.baseurl }}/assets/js/lunrsearchengine.js', function () {
        searchReady = true;
        window._searchLoading = false;
        if (pendingSearch) {
          lunr_search(pendingSearch);
          pendingSearch = null;
        }
      });
    });
  }

  var searchInput = document.getElementById('lunrsearch');
  searchInput.addEventListener('focus', loadSearchScripts, { once: true });

  document.getElementById('searchForm').addEventListener('submit', function (e) {
    e.preventDefault();
    var term = searchInput.value;
    if (searchReady) {
      lunr_search(term);
    } else {
      pendingSearch = term;
      loadSearchScripts();
    }
  });
})();
</script>
