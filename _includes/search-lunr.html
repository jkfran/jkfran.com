<form
  class="bd-search"
  onSubmit="return handleSearch(document.getElementById('lunrsearch').value);"
>
  <input
    type="text"
    class="form-control text-small launch-modal-search"
    id="lunrsearch"
    name="q"
    maxlength="255"
    value=""
    placeholder="Type and enter..."
  />
</form>

<div id="lunrsearchresults">
  <ul></ul>
</div>

<script>
(function () {
  var searchReady = false;
  var pendingSearch = null;

  function loadScript(src, callback) {
    var s = document.createElement('script');
    s.src = src;
    s.onload = callback;
    document.body.appendChild(s);
  }

  function loadSearchScripts() {
    if (searchReady || window._searchLoading) return;
    window._searchLoading = true;
    loadScript('{{ site.baseurl }}/assets/js/lunr.js', function () {
      loadScript('{{ site.baseurl }}/assets/js/lunrsearchengine.js', function () {
        searchReady = true;
        window._searchLoading = false;
        if (pendingSearch) {
          lunr_search(pendingSearch);
          pendingSearch = null;
        }
      });
    });
  }

  document.getElementById('lunrsearch').addEventListener('focus', loadSearchScripts, { once: true });

  window.handleSearch = function (term) {
    if (searchReady) {
      return lunr_search(term);
    }
    pendingSearch = term;
    loadSearchScripts();
    return false;
  };
})();
</script>
