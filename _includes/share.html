<div class="share sticky-top sticky-top-offset">
  <p>Share</p>
  <ul>
    <li class="mx-4">
      <a
        target="_blank" rel="noopener noreferrer"
        href="https://x.com/intent/tweet?text={{ page.title }}&url={{ page.url | absolute_url }}"
        class="share-link"
        aria-label="Share on X"
      >
        <i class="bi bi-twitter-x" aria-hidden="true"></i>
      </a>
    </li>

    <li class="mx-4">
      <a
        target="_blank" rel="noopener noreferrer"
        href="https://facebook.com/sharer.php?u={{ page.url | absolute_url }}"
        class="share-link"
        aria-label="Share on Facebook"
      >
        <i class="bi bi-facebook" aria-hidden="true"></i>
      </a>
    </li>

    <li class="mx-4">
      <a
        target="_blank" rel="noopener noreferrer"
        href="https://www.linkedin.com/shareArticle?mini=true&url={{ page.url | absolute_url }}"
        class="share-link"
        aria-label="Share on LinkedIn"
      >
        <i class="bi bi-linkedin" aria-hidden="true"></i>
      </a>
    </li>
  </ul>
</div>
