# Site
name: "jkfran"
title: "Francisco Jiménez Cabrera"
description: "Technical blog and free developer tools by Francisco Jiménez Cabrera. Tutorials on DevOps, Linux, Python, MLOps, and AI — plus online tools like JSON formatter, regex tester, and more."
logo: "assets/images/logo.png"
baseurl: /
url: "https://jkfran.com"
include: ["_pages", "_tools"]
permalink: /:title/

# Authors
authors:
  jkfran:
    name: Francisco Jiménez Cabrera
    display_name: Francisco Jiménez Cabrera
    gravatar: 5fdfe91237cdb6cc5d84b2776ee0b8ab
    email: jkfran@gmail.com
    web: https://jkfran.com/about
    twitter: https://x.com/jkfran_
    description: "Senior Software Engineer at PolyModels Hub. Passionate about DevOps, MLOps, and building better software."

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-seo-tag

# Pagination
paginate: 9
paginate_path: /page:num/

# Other
markdown: kramdown

kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: true

exclude:
  - LICENSE
  - README.md
  - Gemfile
  - Gemfile.lock
  - package.json
  - package-lock.json
  - node_modules
  - eslint.config.js
  - .prettierrc
  - .prettierignore
  - .stylelintrc.json
  - .htmlhintrc
  - .markdownlint-cli2.jsonc
